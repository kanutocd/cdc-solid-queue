plugins:
  - rubocop-rake
  - rubocop-minitest

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  Exclude:
    - vendor/**/*
    - tmp/**/*

Style/Documentation:
  Enabled: true

Metrics/BlockLength:
  Exclude:
    - test/**/*
    - "*.gemspec"

Minitest/MultipleAssertions:
  Max: 5

Metrics/MethodLength:
  Max: 13

Metrics/CyclomaticComplexity:
  Max: 10